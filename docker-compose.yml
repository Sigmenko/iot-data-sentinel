version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: iot_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: iot_telemetry
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: . #"Шукай Dockerfile прямо тут"
    container_name: iot_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db


volumes:
  pgdata: